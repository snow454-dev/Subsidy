<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>管理者ダッシュボード | 補助金AIパートナー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0F1A;
    --surface: #141926;
    --surface-hover: #1C2333;
    --border: #242D3D;
    --text: #E2E8F0;
    --text-muted: #64748B;
    --accent: #3B82F6;
    --accent-glow: rgba(59, 130, 246, 0.15);
    --green: #10B981;
    --green-glow: rgba(16, 185, 129, 0.15);
    --red: #EF4444;
    --red-glow: rgba(239, 68, 68, 0.12);
    --amber: #F59E0B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== ログイン画面 ===== */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(16,185,129,0.06) 0%, transparent 50%),
      var(--bg);
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    margin: 20px;
    animation: fadeUp 0.5s ease;
  }
  .login-box h1 {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .login-box p { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box .error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

  /* ===== 共通ボタン ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    width: 100%;
    justify-content: center;
    margin-top: 16px;
    padding: 14px;
  }
  .btn-primary:hover { background: #2563EB; transform: translateY(-1px); }
  .btn-upload {
    background: var(--green);
    color: white;
  }
  .btn-upload:hover { background: #059669; }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
    padding: 6px 14px;
    font-size: 12px;
  }
  .btn-danger:hover { background: var(--red-glow); }
  .btn-logout {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-size: 12px;
    padding: 6px 14px;
  }
  .btn-logout:hover { color: var(--text); border-color: var(--text-muted); }

  /* ===== ダッシュボード ===== */
  .dashboard { display: none; }
  .dashboard.active { display: block; }
  .login-screen.hidden { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar h1 { font-size: 16px; font-weight: 900; letter-spacing: -0.02em; }
  .topbar-badge {
    background: var(--green-glow);
    color: var(--green);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    margin-left: 10px;
  }

  .content { max-width: 900px; margin: 0 auto; padding: 24px 20px 80px; }

  /* アップロードエリア */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    transition: all 0.3s;
    margin-bottom: 32px;
    background: var(--surface);
    position: relative;
  }
  .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .upload-zone svg { margin: 0 auto 16px; display: block; opacity: 0.5; }
  .upload-zone p { color: var(--text-muted); font-size: 14px; }
  .upload-zone .highlight { color: var(--accent); cursor: pointer; font-weight: 700; }
  .upload-zone input[type="file"] { display: none; }

  .upload-options {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .upload-options select {
    padding: 8px 14px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* ステータスメッセージ */
  .status {
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 13px;
    font-weight: 500;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .status.success { display: block; background: var(--green-glow); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
  .status.error { display: block; background: var(--red-glow); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .status.loading { display: block; background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }

  /* PDF一覧 */
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }
  .pdf-list { display: flex; flex-direction: column; gap: 8px; }
  .pdf-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: all 0.2s;
  }
  .pdf-item:hover { background: var(--surface-hover); border-color: var(--accent); }
  .pdf-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--red-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }
  .pdf-info { flex: 1; min-width: 0; }
  .pdf-name {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pdf-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .pdf-category {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--accent-glow);
    color: var(--accent);
    font-weight: 500;
  }
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .empty-state svg { margin: 0 auto 12px; opacity: 0.3; }

  /* プログレスバー */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 16px;
    display: none;
  }
  .progress-bar.active { display: block; }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
    animation: indeterminate 1.5s infinite;
  }

  @keyframes indeterminate {
    0% { width: 0%; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* レスポンシブ */
  @media (max-width: 640px) {
    .login-box { padding: 32px 24px; }
    .upload-zone { padding: 28px 16px; }
    .pdf-item { flex-wrap: wrap; }
    .topbar { padding: 12px 16px; }
    .content { padding: 16px 12px 60px; }
  }
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🔐 管理者ログイン</h1>
    <p>補助金AIパートナー ナレッジ管理</p>
    <input type="password" id="passwordInput" placeholder="管理者パスワードを入力" autocomplete="off" />
    <div class="error" id="loginError">パスワードが正しくありません</div>
    <button class="btn btn-primary" onclick="login()">ログイン</button>
  </div>
</div>

<!-- ===== ダッシュボード ===== -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div style="display:flex;align-items:center;">
      <h1>📋 ナレッジ管理</h1>
      <span class="topbar-badge" id="pdfCount">0件</span>
    </div>
    <button class="btn btn-logout" onclick="logout()">ログアウト</button>
  </div>

  <div class="content">
    <!-- ステータス -->
    <div class="status" id="statusMsg"></div>

    <!-- アップロードエリア -->
    <div class="upload-zone" id="uploadZone">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>PDFファイルをドラッグ＆ドロップ</p>
      <p>または <span class="highlight" onclick="document.getElementById('fileInput').click()">ファイルを選択</span></p>
      <input type="file" id="fileInput" accept=".pdf" multiple />

      <div class="upload-options">
        <select id="categorySelect">
          <option value="補助金公募要領">補助金公募要領</option>
          <option value="補助金FAQ">補助金FAQ</option>
          <option value="採択事例">採択事例</option>
          <option value="申請ガイド">申請ガイド</option>
          <option value="政策・制度情報">政策・制度情報</option>
          <option value="その他">その他</option>
        </select>
        <button class="btn btn-upload" id="uploadBtn" onclick="uploadFiles()" disabled>
          アップロード
        </button>
      </div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-bar-fill"></div>
      </div>
    </div>

    <!-- PDF一覧 -->
    <div class="section-title">アップロード済みナレッジ</div>
    <div class="pdf-list" id="pdfList">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>まだPDFがアップロードされていません</p>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 設定 =====
// ★★★ ここにGASのウェブアプリURLを設定 ★★★
const GAS_URL = "https://script.google.com/macros/s/AKfycbyrSZrb1rr5kTzCNDOa1ZnKEQDFQy6iTylAOOndDF-yzIfMCpYSSJ72pIRiGc9zy7JEwg/exec";

let adminPassword = "";
let selectedFiles = [];

// ===== ログイン =====
function login() {
  const pw = document.getElementById("passwordInput").value;
  if (!pw) return;
  adminPassword = pw;

  // パスワード検証: PDF一覧を取得してみて成功すればOK
  showStatus("認証中...", "loading");
  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "listPDFs", password: pw })
  })
  .then(r => r.json())
  .then(data => {
    if (data.status === "success") {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("dashboard").classList.add("active");
      clearStatus();
      renderPDFList(data.pdfs || []);
    } else {
      adminPassword = "";
      document.getElementById("loginError").style.display = "block";
      clearStatus();
    }
  })
  .catch(() => {
    showStatus("通信エラーが発生しました", "error");
  });
}

// Enterキーでログイン
document.getElementById("passwordInput").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

function logout() {
  adminPassword = "";
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("dashboard").classList.remove("active");
  document.getElementById("passwordInput").value = "";
  document.getElementById("loginError").style.display = "none";
}

// ===== ファイル選択 =====
const fileInput = document.getElementById("fileInput");
const uploadZone = document.getElementById("uploadZone");
const uploadBtn = document.getElementById("uploadBtn");

fileInput.addEventListener("change", () => {
  selectedFiles = Array.from(fileInput.files);
  uploadBtn.disabled = selectedFiles.length === 0;
  if (selectedFiles.length > 0) {
    uploadBtn.textContent = `${selectedFiles.length}件をアップロード`;
  }
});

// ドラッグ＆ドロップ
uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("dragover"); });
uploadZone.addEventListener("dragleave", () => { uploadZone.classList.remove("dragover"); });
uploadZone.addEventListener("drop", e => {
  e.preventDefault();
  uploadZone.classList.remove("dragover");
  const files = Array.from(e.dataTransfer.files).filter(f => f.type === "application/pdf");
  if (files.length === 0) { showStatus("PDFファイルのみアップロードできます", "error"); return; }
  selectedFiles = files;
  uploadBtn.disabled = false;
  uploadBtn.textContent = `${files.length}件をアップロード`;
});

// ===== アップロード =====
async function uploadFiles() {
  if (selectedFiles.length === 0) return;
  const category = document.getElementById("categorySelect").value;

  uploadBtn.disabled = true;
  document.getElementById("progressBar").classList.add("active");

  let successCount = 0;
  let errorCount = 0;

  for (const file of selectedFiles) {
    showStatus(`アップロード中: ${file.name} ...`, "loading");
    try {
      const base64 = await fileToBase64(file);
      const response = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          action: "uploadPDF",
          password: adminPassword,
          fileName: file.name,
          fileBase64: base64,
          category: category
        })
      });
      const data = await response.json();
      if (data.status === "success") {
        successCount++;
      } else {
        errorCount++;
        console.error(file.name, data.message);
      }
    } catch (err) {
      errorCount++;
      console.error(file.name, err);
    }
  }

  document.getElementById("progressBar").classList.remove("active");
  selectedFiles = [];
  fileInput.value = "";
  uploadBtn.textContent = "アップロード";
  uploadBtn.disabled = true;

  if (errorCount === 0) {
    showStatus(`✅ ${successCount}件のアップロードが完了しました`, "success");
  } else {
    showStatus(`${successCount}件成功、${errorCount}件失敗`, "error");
  }

  refreshList();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const base64 = result.split(",")[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== PDF一覧 =====
function refreshList() {
  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "listPDFs", password: adminPassword })
  })
  .then(r => r.json())
  .then(data => {
    if (data.status === "success") {
      renderPDFList(data.pdfs || []);
    }
  })
  .catch(console.error);
}

function renderPDFList(pdfs) {
  const list = document.getElementById("pdfList");
  document.getElementById("pdfCount").textContent = pdfs.length + "件";

  if (pdfs.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>まだPDFがアップロードされていません</p>
      </div>`;
    return;
  }

  list.innerHTML = pdfs.map(pdf => {
    const date = new Date(pdf.uploadedAt).toLocaleDateString("ja-JP");
    const chars = pdf.textLength ? Number(pdf.textLength).toLocaleString() + "文字" : "—";
    return `
      <div class="pdf-item">
        <div class="pdf-icon">📄</div>
        <div class="pdf-info">
          <div class="pdf-name">${escapeHtml(pdf.fileName)}</div>
          <div class="pdf-meta">
            <span>${date}</span>
            <span>${chars}</span>
            <span class="pdf-category">${escapeHtml(pdf.category)}</span>
          </div>
        </div>
        <button class="btn btn-danger" onclick="deletePDF('${pdf.id}', '${escapeHtml(pdf.fileName)}')">削除</button>
      </div>`;
  }).join("");
}

// ===== PDF削除 =====
function deletePDF(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;

  showStatus("削除中...", "loading");
  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "deletePDF", password: adminPassword, id: id })
  })
  .then(r => r.json())
  .then(data => {
    if (data.status === "success") {
      showStatus("✅ 削除しました", "success");
      refreshList();
    } else {
      showStatus("削除に失敗: " + data.message, "error");
    }
  })
  .catch(() => showStatus("通信エラー", "error"));
}

// ===== ユーティリティ =====
function showStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status " + type;
}
function clearStatus() {
  const el = document.getElementById("statusMsg");
  el.className = "status";
}
function escapeHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
